<div class="container">
    <h1>尺码助手</h1>
    <div class="sub">
        选择材质，输入多个规格（每行一个）和单价，查询对应长宽高克重，自动换算英寸尺码。<br>
        点击复制按钮可一键复制表格内容。未找到的规格将在下方展示相似规格表格。<br>
        地毯样机，小工具可联系萝卜头——QQ:404336413
    </div>

    <!-- 输入行：规格列表在前，单价和材质上下分布 -->
    <div class="input-container">
        <div class="spec-box">
            <label>规格列表 (一行一个)</label>

        </div>
        <div class="side-inputs">
            <div class="material-box">
                <label>材质</label>

                        <th>尺码 (in/cm)</th>

                        <th>宽度(cm)</th>
                        <th>高度(cm)</th>
                        <th>克重(g)</th>
                        <th>材质</th>
                        <th>面积(㎡)</th>
                    </tr>

                    <!-- 结果将通过JavaScript动态添加 -->

<!-- 模拟交互脚本 -->
<!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        // Supabase 配置
        const supabaseUrl = 'https://wxtqqggghdpujycszrnz.supabase.co';
        const supabaseKey = 'sb_publishable_olBg7voMw0CJirzaqI2vbQ_19BftR_l';
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);
        const TABLE_NAME = 'shuju';
        
        // 材质映射
        const materialMap = { 1: '天鹅绒', 2: '仿羊绒', 3: '海绵底' };
        
        // 材质样式映射
        const materialClassMap = { 1: 'material-1', 2: 'material-2', 3: 'material-3' };
        
        // 内存数据缓存
        let specsData = [];
        
        // 初始化数据
        async function initData() {
            try {
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*');
                
                if (error) {
                    console.error('获取数据失败:', error);
                    return;
                }
                
                specsData = data;
                console.log('数据加载成功，共', specsData.length, '条记录');
                console.log('数据加载成功，共', specsData.length, '条记录，第一条:', specsData[0]);
            } catch (error) {
                console.error('初始化数据失败:', error);
            }
        }
        
        // 英寸换算
        function cmToInch(cm) {
            return (cm / 2.54).toFixed(1);
        }
        
        // 面积计算
        function calculateArea(width, height) {
            return ((width * height) / 10000).toFixed(2);
        }
        
        // 解析规格字符串
        function parseSpec(spec) {
            const parts = spec.trim().split('*');
            if (parts.length === 2) {
                return {
                    width: parseFloat(parts[0]),
                    height: parseFloat(parts[1])
                };
            }
            return null;
        }
        
        // 查找规格
        function findSpec(spec, material) {
            const materialNum = parseInt(material);
            return specsData.find(item => 
                item.spec.trim() === spec.trim() && Number(item.material) === materialNum
            );
        }
        
        // 查找相似规格
        function findSimilarSpecs(spec, material, limit = 3) {
            const parsedSpec = parseSpec(spec);
            if (!parsedSpec) return [];
            
            return specsData
                .filter(item => Number(item.material) === parseInt(material))
                .map(item => {
                    const itemSpec = parseSpec(item.spec);
                    if (!itemSpec) return null;
                    
                    const difference = Math.abs(parsedSpec.width - itemSpec.width) + 
                                     Math.abs(parsedSpec.height - itemSpec.height);
                    
                    return {
                        ...item,
                        difference
                    };
                })
                .filter(item => item !== null)
                .sort((a, b) => a.difference - b.difference)
                .slice(0, limit);
        }
        
        // 渲染结果表格
        function renderResultTable(specs, material) {
            const resultBody = document.getElementById('resultBody');
            resultBody.innerHTML = '';
            
            const notFoundSpecs = [];
            
            specs.forEach(spec => {
                const specData = findSpec(spec, material);
                const parsedSpec = parseSpec(spec);
                
                const row = document.createElement('tr');
                
                if (!specData) {
                    row.classList.add('not-found-row');
                    notFoundSpecs.push(spec);
                }
                
                // 尺码 (in/cm)
                const inchWidth = parsedSpec ? cmToInch(parsedSpec.width) : '-';
                const inchHeight = parsedSpec ? cmToInch(parsedSpec.height) : '-';
                const sizeCell = document.createElement('td');
                sizeCell.textContent = `${inchWidth}*${inchHeight}in / ${spec}cm`;
                row.appendChild(sizeCell);
                
                // 规格
                const specCell = document.createElement('td');
                specCell.innerHTML = `<strong>${spec}${!specData ? ' (未找到)' : ''}</strong>`;
                row.appendChild(specCell);
                
                // 长度(cm)
                const lengthCell = document.createElement('td');
                lengthCell.textContent = specData ? specData.length : '-';
                row.appendChild(lengthCell);
                
                // 宽度(cm)
                const widthCell = document.createElement('td');
                widthCell.textContent = specData ? specData.width : '-';
                row.appendChild(widthCell);
                
                // 高度(cm)
                const heightCell = document.createElement('td');
                heightCell.textContent = specData ? specData.height : '-';
                row.appendChild(heightCell);
                
                // 克重(g)
                const weightCell = document.createElement('td');
                if (specData) {
                    if (specData.weight === 0) {
                        weightCell.innerHTML = '<span class="weight-zero">0 (空)</span>';
                    } else {
                        weightCell.textContent = specData.weight;
                    }
                } else {
                    weightCell.textContent = '-';
                }
                row.appendChild(weightCell);
                
                // 材质
                const materialCell = document.createElement('td');
                if (specData) {
                    const materialName = materialMap[specData.material] || '-';
                    const materialClass = materialClassMap[specData.material] || '';
                    materialCell.innerHTML = `<span class="material-badge ${materialClass}">${materialName}</span>`;
                } else {
                    materialCell.textContent = '-';
                }
                row.appendChild(materialCell);
                
                // 面积(㎡)
                const areaCell = document.createElement('td');
                if (parsedSpec) {
                    areaCell.textContent = calculateArea(parsedSpec.width, parsedSpec.height);
                } else {
                    areaCell.textContent = '-';
                }
                row.appendChild(areaCell);
                
                resultBody.appendChild(row);
            });
            
            return notFoundSpecs;
        }
        
        // 渲染相似规格表格
        function renderSimilarSpecs(notFoundSpecs, material) {
            const similarSection = document.querySelector('.similar-section');
            const similarBody = document.querySelector('.similar-table tbody');
            
            if (notFoundSpecs.length === 0) {
                similarSection.style.display = 'none';
                return;
            }
            
            similarBody.innerHTML = '';
            
            notFoundSpecs.forEach(spec => {
                const similarSpecs = findSimilarSpecs(spec, material);
                
                if (similarSpecs.length > 0) {
                    // 添加规格标题
                    const titleRow = document.createElement('tr');
                    const titleCell = document.createElement('td');
                    titleCell.colSpan = 8;
                    titleCell.style.fontWeight = '600';
                    titleCell.style.background = '#f1f5f9';
                    titleCell.style.padding = '0.5rem 0.8rem';
                    titleCell.textContent = `基于 ${spec}`;
                    titleRow.appendChild(titleCell);
                    similarBody.appendChild(titleRow);
                    
                    // 添加相似规格行
                    similarSpecs.forEach(item => {
                        const row = document.createElement('tr');
                        
                        // 尺码 (in/cm)
                        const parsedSpec = parseSpec(item.spec);
                        const inchWidth = parsedSpec ? cmToInch(parsedSpec.width) : '-';
                        const inchHeight = parsedSpec ? cmToInch(parsedSpec.height) : '-';
                        const sizeCell = document.createElement('td');
                        sizeCell.textContent = `${inchWidth}*${inchHeight}in / ${item.spec}cm`;
                        row.appendChild(sizeCell);
                        
                        // 规格
                        const specCell = document.createElement('td');
                        specCell.innerHTML = `<strong>${item.spec}</strong>`;
                        row.appendChild(specCell);
                        
                        // 长度(cm)
                        const lengthCell = document.createElement('td');
                        lengthCell.textContent = item.length;
                        row.appendChild(lengthCell);
                        
                        // 宽度(cm)
                        const widthCell = document.createElement('td');
                        widthCell.textContent = item.width;
                        row.appendChild(widthCell);
                        
                        // 高度(cm)
                        const heightCell = document.createElement('td');
                        heightCell.textContent = item.height;
                        row.appendChild(heightCell);
                        
                        // 克重(g)
                        const weightCell = document.createElement('td');
                        if (item.weight === 0) {
                            weightCell.innerHTML = '<span class="weight-zero">0 (空)</span>';
                        } else {
                            weightCell.textContent = item.weight;
                        }
                        row.appendChild(weightCell);
                        
                        // 材质
                        const materialCell = document.createElement('td');
                        const materialName = materialMap[item.material] || '-';
                        const materialClass = materialClassMap[item.material] || '';
                        materialCell.innerHTML = `<span class="material-badge ${materialClass}">${materialName}</span>`;
                        row.appendChild(materialCell);
                        
                        // 面积(㎡)
                        const areaCell = document.createElement('td');
                        if (parsedSpec) {
                            areaCell.textContent = calculateArea(parsedSpec.width, parsedSpec.height);
                        } else {
                            areaCell.textContent = '-';
                        }
                        row.appendChild(areaCell);
                        
                        // 添加点击事件
                        row.addEventListener('click', function() {
                            const specInput = document.getElementById('specInput');
                            specInput.value += '\n' + item.spec;
                            alert(`已将规格 ${item.spec} 添加到输入框`);
                        });
                        
                        similarBody.appendChild(row);
                    });
                }
            });
            
            similarSection.style.display = 'block';
        }
        
        // 复制表格内容
        function copyTableContent(tableId) {
            const table = document.getElementById(tableId);
            if (!table) return;
            
            let content = '';
            
            // 复制表头
            const headers = table.querySelectorAll('th');
            headers.forEach((header, index) => {
                content += header.textContent;
                if (index < headers.length - 1) content += '\t';
            });
            content += '\n';
            
            // 复制数据行
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                cells.forEach((cell, index) => {
                    content += cell.textContent.trim();
                    if (index < cells.length - 1) content += '\t';
                });
                content += '\n';
            });
            
            navigator.clipboard.writeText(content).then(function() {
                alert('复制成功！表格内容已复制到剪贴板。');
            }).catch(function() {
                alert('复制失败，请手动复制。');
            });
        }
        
        // 查询按钮功能
        document.getElementById('queryBtn').addEventListener('click', async function() {
            const material = document.getElementById('materialSelect').value;
            const specInput = document.getElementById('specInput').value;
            const specs = specInput.split('\n').filter(spec => spec.trim() !== '');
            console.log('查询按钮点击，当前材质:', material, '规格列表:', specs);
            
            if (specs.length === 0) {
                alert('请输入规格列表');
                return;
            }
            
            // 显示结果表格
            document.querySelector('.result-section').style.display = 'block';
            
            // 渲染结果
            const notFoundSpecs = renderResultTable(specs, material);
            
            // 渲染相似规格
            renderSimilarSpecs(notFoundSpecs, material);
        });

        // 表格复制功能
        document.getElementById('copyResultBtn').addEventListener('click', function() {
            copyTableContent('resultTable');
        });

        document.getElementById('copySimilarBtn').addEventListener('click', function() {
            copyTableContent('similarTable');
        });
        
        // 初始化数据
        initData();
    })();
</script>
</body>
</html>
